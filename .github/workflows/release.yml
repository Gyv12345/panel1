name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.0)'
        required: true
        default: '0.1.0'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (musl for wider distro compatibility)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          # Linux ARM64 (musl for wider distro compatibility)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          # macOS x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          # macOS ARM64
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux targets)
        if: runner.os == 'Linux' && contains(matrix.target, 'unknown-linux')
        run: |
          cargo install cross --locked

      - name: Build (Linux via cross)
        if: runner.os == 'Linux' && contains(matrix.target, 'unknown-linux')
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (macOS native)
        if: runner.os == 'macOS'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Prepare release package
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          TARGET=${{ matrix.target }}
          DIST_DIR="panel1-${VERSION}-${TARGET}"

          mkdir -p "${DIST_DIR}/bin"
          mkdir -p "${DIST_DIR}/data"

          # 复制二进制文件
          cp target/${TARGET}/release/panel1 "${DIST_DIR}/bin/"
          chmod +x "${DIST_DIR}/bin/"*

          # 创建 README
          cat > "${DIST_DIR}/README.md" << 'EOF'
          # Panel1 - Linux Server Management Panel

          ## Installation

          ```bash
          # Direct install (recommended)
          curl -fsSL https://raw.githubusercontent.com/Gyv12345/panel1/main/install.sh | bash
          ```

          ## Usage

          ```bash
          panel1              # Start TUI interface
          panel1 tui          # Start TUI interface
          panel1 status       # Show system status
          panel1 install <url> # Install from URL
          panel1 --help       # Show all commands
          ```

          ## License
          MIT
          EOF

          # 打包
          if [ "${{ matrix.archive }}" == "tar.gz" ]; then
            tar -czvf "${DIST_DIR}.tar.gz" "${DIST_DIR}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: panel1-${{ matrix.target }}
          path: panel1-*.tar.gz
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Panel1 v${{ steps.version.outputs.VERSION }}
          body: |
            ## Panel1 v${{ steps.version.outputs.VERSION }}

            ### Downloads
            - **Linux x86_64 (musl)**: `panel1-${{ steps.version.outputs.VERSION }}-x86_64-unknown-linux-musl.tar.gz`
            - **Linux ARM64 (musl)**: `panel1-${{ steps.version.outputs.VERSION }}-aarch64-unknown-linux-musl.tar.gz`
            - **macOS Intel**: `panel1-${{ steps.version.outputs.VERSION }}-x86_64-apple-darwin.tar.gz`
            - **macOS Apple Silicon**: `panel1-${{ steps.version.outputs.VERSION }}-aarch64-apple-darwin.tar.gz`

            ### Usage
            ```bash
            curl -fsSL https://raw.githubusercontent.com/Gyv12345/panel1/main/install.sh | bash
            ```
          files: |
            artifacts/**/panel1-*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
